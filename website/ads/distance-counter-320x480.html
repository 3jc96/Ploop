<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=320,initial-scale=1">
<meta name="ad.size" content="width=320,height=480">
<meta name="ad.orientation" content="portrait">
<title>Ploop — Distance Counter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:320px;height:480px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#ad{position:relative;width:320px;height:480px;background:#111827;cursor:pointer;overflow:hidden}

.grid{position:absolute;inset:0;opacity:.07;background-image:
  linear-gradient(rgba(33,150,243,.5) 1px,transparent 1px),
  linear-gradient(90deg,rgba(33,150,243,.5) 1px,transparent 1px);
  background-size:32px 32px;animation:gridScroll 3s linear infinite}
@keyframes gridScroll{to{background-position:32px 32px}}

.radar{position:absolute;top:45%;left:50%;width:0;height:0;border-radius:50%;border:2px solid rgba(33,150,243,.3);transform:translate(-50%,-50%);opacity:0}
.radar.ping{animation:radarPing 2s ease-out forwards}
@keyframes radarPing{0%{width:0;height:0;opacity:.8}100%{width:360px;height:360px;opacity:0}}

/* --- Logo --- */
.logo{position:absolute;top:16px;left:16px;display:flex;align-items:center;gap:7px;z-index:4}
.logo-dot{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#2196f3,#6366f1);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700}
.logo-text{font-size:16px;font-weight:800;color:#e2e8f0;letter-spacing:.3px}

/* --- Question --- */
.question{position:absolute;top:70px;left:0;right:0;text-align:center;font-size:18px;font-weight:700;color:#e2e8f0;line-height:1.4;padding:0 30px;opacity:0;transform:translateY(12px);transition:all .6s ease}
.question.show{opacity:1;transform:translateY(0)}
.question em{color:#60a5fa;font-style:normal}

/* --- Counter --- */
.counter-wrap{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:opacity .4s ease}
.counter-wrap.show{opacity:1}
.counter{font-size:72px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:-2px}
.counter span{font-size:28px;font-weight:600;color:#94a3b8;vertical-align:baseline;margin-left:2px}
.counter-label{font-size:13px;color:#64748b;margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}

/* --- Pin --- */
.pin{position:absolute;top:42%;left:50%;transform:translate(-50%,-100%) scale(0);font-size:48px;filter:drop-shadow(0 4px 16px rgba(33,150,243,.5));transition:transform .5s cubic-bezier(.34,1.56,.64,1);z-index:3}
.pin.drop{transform:translate(-50%,-100%) scale(1)}

/* --- Result card --- */
.result{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(17,24,39,.98) 70%,transparent);padding:24px 24px 20px;opacity:0;transform:translateY(30px);transition:all .6s ease;z-index:2}
.result.show{opacity:1;transform:translateY(0)}
.result-name{font-size:16px;font-weight:700;color:#fff}
.result-meta{display:flex;align-items:center;gap:10px;margin-top:5px}
.result-stars{color:#facc15;font-size:14px;letter-spacing:1px}
.result-tag{font-size:11px;background:rgba(33,150,243,.2);color:#60a5fa;padding:3px 9px;border-radius:8px;font-weight:600}
.result-sub{font-size:11.5px;color:#94a3b8;margin-top:6px}

.cta{display:block;width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#2196f3,#6366f1);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px;box-shadow:0 4px 18px rgba(33,150,243,.4);transition:all .2s ease;text-align:center}
.cta:hover{transform:scale(1.03);box-shadow:0 6px 22px rgba(33,150,243,.5)}
</style>
</head>
<body>
<div id="ad" onclick="clickThrough()">

  <div class="grid"></div>
  <div class="radar" id="r1"></div>
  <div class="radar" id="r2"></div>

  <div class="logo">
    <div class="logo-dot">P</div>
    <span class="logo-text">Ploop</span>
  </div>

  <div class="question" id="question">How far is the nearest<br><em>clean toilet</em>?</div>

  <div class="counter-wrap" id="counterWrap">
    <div class="counter" id="counter">200<span>m</span></div>
    <div class="counter-label">away</div>
  </div>

  <div class="pin" id="pin">&#x1F4CD;</div>

  <div class="result" id="result">
    <div class="result-name">Sunshine Plaza Restroom</div>
    <div class="result-meta">
      <span class="result-stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
      <span class="result-tag">Bidet</span>
      <span class="result-tag">Wheelchair</span>
    </div>
    <div class="result-sub">Rated clean by 24 users</div>
    <button class="cta" id="cta">Download Ploop</button>
  </div>
</div>

<script>
var clickTag = "https://ploop-app.com";
function clickThrough(){if(typeof ExitApi!=="undefined"){ExitApi.exit()}else{window.open(clickTag,"_blank")}}

var counterEl = document.getElementById("counter");

setTimeout(function(){ document.getElementById("question").classList.add("show") }, 300);
setTimeout(function(){
  document.getElementById("question").classList.remove("show");
  document.getElementById("counterWrap").classList.add("show");
  document.getElementById("r1").classList.add("ping");
  startCounter();
}, 1800);
setTimeout(function(){ document.getElementById("r2").classList.add("ping") }, 3200);
setTimeout(function(){
  document.getElementById("counterWrap").style.opacity = "0";
  document.getElementById("pin").classList.add("drop");
  setTimeout(function(){ document.getElementById("result").classList.add("show") }, 400);
}, 5500);

function startCounter() {
  var current = 200, target = 12, step = 1, speed = 18;
  var iv = setInterval(function() {
    if (current <= 80 && step > 1) step = 1;
    if (current > 80) step = Math.max(1, Math.floor((current - target) / 40));
    current -= step;
    if (current <= target) { current = target; clearInterval(iv); }
    counterEl.innerHTML = current + "<span>m</span>";
  }, speed);
}
</script>
</body>
</html>
